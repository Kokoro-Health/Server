version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: kokoro_db
    env_file: local.env
    environment:
      - POSTGRES_DB=kokoro_db
      - POSTGRES_USER=kokoro
      - POSTGRES_PASSWORD=kokoroSuperSecurePassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kokoro" ]
      interval: 5s
      retries: 5

  maildev:
    image: maildev/maildev
    container_name: maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:1080 || exit 1" ]
      interval: 5s
      retries: 5

volumes:
  postgres_data: