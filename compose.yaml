version: '3.9'

services:
  postgres:
    image: postgres:latest
    container_name: kokoro_db
    env_file: local.env
    environment:
      - POSTGRES_DB=kokoro_db
      - POSTGRES_USER=kokoro
      - POSTGRES_PASSWORD=kokoroSuperSecurePassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kokoro" ]
      interval: 5s
      retries: 5
    labels:
      - "org.springframework.boot.service-connection=false"

  maildev:
    image: maildev/maildev:latest
    container_name: maildev
    ports:
      - "1080:1080"
      - "1025:1025"

  vault:
    image: hashicorp/vault:latest
    container_name: kokoro_vault
    ports:
      - "8200:8200"

volumes:
  postgres_data: