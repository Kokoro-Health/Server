spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop
      file: compose.yaml
      profiles:
        active: dev
  mail:
    properties:
      mail:
        debug: true
kokoro:
  encryption:
    dev_key: ${ENCRYPTION_KEY}
  cors:
    allow-origin:
      - "capacitor://localhost"
      - "http://localhost:5173"
springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /docs/swagger
management:
  endpoint:
    health:
      show-details: always
      show-components: always
