spring:
  application:
    name: Kokoro-API
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE}
        debug: true
  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop
      file: compose.yaml
springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /docs/swagger

server:
  address: 0.0.0.0
  port: 8080
kokoro:
  storage:
    path: "./files"
  encryption:
    keyStorePath: ${ENCRYPTION_KEY_STORE_PATH:./keys}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 604800000 # 7 days
    issuer: kokoro
  cors:
    allow-origin:
      - "capacitor://localhost"
      - "http://localhost:5173"
      - ${FRONTEND_URL}
