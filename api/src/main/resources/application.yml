spring:
  application:
    name: Kokoro-API
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE}
management:
  endpoints:
    web:
      base-path: /actuator/health
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
server:
  address: 0.0.0.0
  port: 8080
kokoro:
  storage:
    path: ${STORAGE_PATH}
  encryption:
    keyStorePath: ${ENCRYPTION_KEY_STORE_PATH}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 604800000 # 7 days
    issuer: kokoro
