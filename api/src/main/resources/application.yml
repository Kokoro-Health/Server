spring:
  application:
    name: Kokoro-API
  datasource:
    username: ${DB_USERNAME}
    name: ${DB_NAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE}
        debug: true
springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /docs/swagger
jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000 # 7 days
  issuer: kokoro
