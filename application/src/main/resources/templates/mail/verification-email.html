<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
<div style="background-color: #f5f5f5; padding: 30px; border-radius: 8px;">
    <h1 style="color: #333;">Verify Your Email</h1>
    <p style="color: #666;">Hello <span th:text="${email}">user@example.com</span>,</p>
    <p style="color: #666;">Please use the following verification code:</p>
    <div style="background-color: #fff; padding: 20px; border-radius: 4px; text-align: center; margin: 20px 0;">
        <span style="font-size: 24px; font-weight: bold; color: #000;" th:text="${code}">123456</span>
    </div>
    <p style="color: #666;">This code expires in <span th:text="${expirationMinutes}">10</span> minutes.</p>
    <p style="color: #666;">If you didn't request this, please ignore this email.</p>
    <hr style="border: none; border-top: 1px solid #ddd; margin: 30px 0;">
    <p style="color: #999; font-size: 12px;">© <span th:text="${year}">2026</span> Kokoro. All rights reserved.</p>
</div>
</body>
</html>
